name: CI/CD Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  
  testes:
    name: Rodar testes
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: merito_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: merito_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 3001

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        working-directory: backend
        run: npm ci

      - name: Rodar testes
        working-directory: backend
        run: npm test
  build:
    name: Build da imagem Docker
    runs-on: ubuntu-latest
    needs: testes

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t desafio-fullstack-merito-backend ./backend

  deploy:
    name: Simulação de deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy
        run: echo "Deploy realizado com sucesso!"