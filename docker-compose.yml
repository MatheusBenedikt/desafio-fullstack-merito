version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: investimentos_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: investimentos
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: investimentos_backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: investimentos
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: